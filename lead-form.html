<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property & Interior Requirement — Free Consultation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root {
    --blueprint: #12293D;
    --blueprint-line: rgba(255,255,255,0.10);
    --paper: #F3EFE6;
    --brass: #C98A3E;
    --brass-bright: #E2A85C;
    --ink: #1A2733;
    --ink-soft: rgba(26,39,51,0.62);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--blueprint);
    background-image:
      linear-gradient(var(--blueprint-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--blueprint-line) 1px, transparent 1px);
    background-size: 32px 32px;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
  }

  .sheet {
    width: 100%;
    max-width: 560px;
    background: var(--paper);
    border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    overflow: hidden;
    position: relative;
  }

  .sheet::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--brass);
  }

  .header {
    padding: 40px 40px 24px;
    border-bottom: 1px dashed rgba(26,39,51,0.2);
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--brass);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .eyebrow::before {
    content: "";
    width: 18px;
    height: 1px;
    background: var(--brass);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.25;
    color: var(--ink);
    margin: 0 0 10px;
  }

  .sub {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0;
  }

  form {
    padding: 28px 40px 40px;
  }

  .field {
    margin-bottom: 22px;
  }

  .field-label {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .field-label .num {
    color: var(--brass);
    font-weight: 500;
  }

  input, select, textarea {
    width: 100%;
    border: none;
    border-bottom: 1.5px solid rgba(26,39,51,0.25);
    background: transparent;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    color: var(--ink);
    padding: 8px 2px 10px;
    transition: border-color 0.2s ease;
  }

  select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%2312293D' stroke-width='1.5' fill='none'/></svg>");
    background-repeat: no-repeat;
    background-position: right 4px center;
  }

  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-bottom-color: var(--brass);
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; }
    .header, form { padding-left: 24px; padding-right: 24px; }
  }

  .hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  button {
    width: 100%;
    margin-top: 12px;
    padding: 16px;
    border: none;
    border-radius: 3px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  button:hover { background: #0d1a24; }
  button:active { transform: scale(0.99); }

  .footnote {
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 16px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.04em;
  }

  .plan-icon {
    position: absolute;
    top: 20px;
    right: 28px;
    width: 34px;
    height: 34px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="sheet">
  <div class="header">
    <svg class="plan-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="4" width="32" height="32" stroke="#12293D" stroke-width="1.2"/>
      <line x1="4" y1="18" x2="22" y2="18" stroke="#12293D" stroke-width="1"/>
      <line x1="22" y1="4" x2="22" y2="18" stroke="#12293D" stroke-width="1"/>
      <line x1="22" y1="24" x2="36" y2="24" stroke="#12293D" stroke-width="1"/>
      <circle cx="12" cy="28" r="2" stroke="#12293D" stroke-width="1"/>
    </svg>
    <div class="eyebrow">Site plan · 01 of 01</div>
    <h1>Tell us what you're looking for</h1>
    <p class="sub">Buying, renting, or renovating in and around Lucknow — share your requirement and we'll connect you with a verified professional.</p>
  </div>

  <form id="leadForm">
    <div class="field">
      <label class="field-label"><span class="num">01</span> Full name</label>
      <input type="text" id="name" required>
    </div>

    <div class="field">
      <label class="field-label"><span class="num">02</span> Mobile number</label>
      <input type="tel" id="mobile" pattern="[0-9]{10}" maxlength="10" required placeholder="10-digit number">
    </div>

    <div class="field">
      <label class="field-label"><span class="num">03</span> What are you looking for?</label>
      <select id="service" required>
        <option value="" disabled selected>Select one</option>
        <option>Buy Property</option>
        <option>Rent Property</option>
        <option>Buy Plot</option>
        <option>Interior Design</option>
        <option>Real Estate Consultation</option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label class="field-label"><span class="num">04</span> City / locality</label>
        <input type="text" id="city" required>
      </div>
      <div class="field">
        <label class="field-label"><span class="num">05</span> Budget range</label>
        <select id="budget" required>
          <option value="" disabled selected>Select</option>
          <option>Below ₹25L</option>
          <option>₹25L – ₹75L</option>
          <option>₹75L – ₹1.5Cr</option>
          <option>Above ₹1.5Cr</option>
          <option>Below ₹3L (interior)</option>
          <option>₹3L – ₹8L (interior)</option>
          <option>₹8L – ₹15L (interior)</option>
          <option>Above ₹15L (interior)</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="field-label"><span class="num">06</span> When do you plan to proceed?</label>
      <select id="timeline" required>
        <option value="" disabled selected>Select one</option>
        <option>Immediately</option>
        <option>Within 30 days</option>
        <option>Within 3 months</option>
        <option>Just exploring</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label"><span class="num">07</span> Additional requirements <span style="text-transform:none; opacity:0.7;">(optional)</span></label>
      <textarea id="notes"></textarea>
    </div>

    <button type="submit" id="submitBtn">Submit requirement →</button>
    <p class="footnote">Sent directly over WhatsApp · No spam, no sharing with third parties</p>
  </form>
</div>

<script>
  // ⚠️ REPLACE this with your own WhatsApp number (country code + number, no + or spaces)
  const WHATSAPP_NUMBER = "917497937625";

  const requiredFields = ['name','mobile','service','city','budget','timeline'];

  document.getElementById('leadForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const service = document.getElementById('service').value;
    const city = document.getElementById('city').value.trim();
    const budget = document.getElementById('budget').value;
    const timeline = document.getElementById('timeline').value;
    const notes = document.getElementById('notes').value.trim();

    const message =
`New Lead Enquiry
-----------------
Name: ${name}
Mobile: ${mobile}
Service: ${service}
City/Locality: ${city}
Budget: ${budget}
Timeline: ${timeline}
Notes: ${notes || "—"}`;

    const encoded = encodeURIComponent(message);
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`;
    window.open(url, '_blank');
  });
</script>

</body>
</html>
